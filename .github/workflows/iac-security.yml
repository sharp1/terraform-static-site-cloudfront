name: IaC Security Gates

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-security:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: iac/terraform/envs/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: TFLint init
        run: tflint --init

      - name: TFLint run
        run: tflint -f compact

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: iac/terraform
          framework: terraform
          soft_fail: false
          # Baseline scope: exclude production-only controls (WAF/AMR, origin failover, geo restrictions, custom cert, S3 replication/events).
          # Hardening phase would re-enable these and implement required infrastructure.
          skip_check: "CKV_AWS_310,CKV_AWS_374,CKV2_AWS_47,CKV2_AWS_42,CKV_AWS_174,CKV2_AWS_62,CKV_AWS_144"
